<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nature Spell Creator Brief</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="topbar-copy">
          <p class="eyebrow" data-i18n="brandEyebrow"></p>
          <h1 data-i18n="heroTitle"></h1>
          <p class="lede topbar-lede" data-i18n="heroIntro"></p>

          <div class="hero-cards">
            <article class="mini-card">
              <span class="mini-label" data-i18n="focusLabel"></span>
              <p data-i18n="focusText"></p>
            </article>
            <article class="mini-card">
              <span class="mini-label" data-i18n="goalLabel"></span>
              <p data-i18n="goalText"></p>
            </article>
            <article class="mini-card">
              <span class="mini-label" data-i18n="mockupLabel"></span>
              <p data-i18n="heroNote"></p>
            </article>
          </div>
        </div>
        <div class="topbar-side">
          <div class="language-switcher" aria-label="Language switcher">
            <button class="lang-btn active" data-lang="es">Español</button>
            <button class="lang-btn" data-lang="en">English</button>
            <button class="lang-btn" data-lang="it">Italiano</button>
            <button class="lang-btn" data-lang="de">Deutsch</button>
            <button class="lang-btn" data-lang="fr">Français</button>
          </div>

          <article class="guide-card">
            <p class="eyebrow" data-i18n="guideEyebrow"></p>
            <h2 class="guide-title" data-i18n="guideTitle"></h2>
            <p class="guide-copy" data-i18n="guideBody"></p>
            <p class="guide-note" data-i18n="guideNote"></p>
            <div class="guide-pill-grid" id="guidePills"></div>
          </article>
        </div>
      </header>

      <main>
        <section class="front-summary-grid">
          <article class="section action-card">
            <div class="section-heading">
              <p class="eyebrow" data-i18n="productIntroEyebrow"></p>
              <h2 data-i18n="productIntroTitle"></h2>
            </div>
            <ul id="productIntroList"></ul>
          </article>

          <article class="section action-card action-card-soft">
            <div class="section-heading">
              <p class="eyebrow" data-i18n="promoEyebrow"></p>
              <h2 data-i18n="promoTitle"></h2>
              <p class="section-copy" data-i18n="promoIntro"></p>
            </div>
            <ul id="promoList"></ul>
          </article>
        </section>

        <section class="section quick-film-section" id="shoot-now">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="scriptLibraryEyebrow"></p>
            <h2 data-i18n="scriptLibraryTitle"></h2>
            <p class="section-copy" data-i18n="scriptLibraryIntro"></p>
          </div>
          <div class="script-launch-grid" id="scriptNowCards"></div>
        </section>

        <section class="jump-strip section">
          <div class="jump-copy">
            <p class="eyebrow" data-i18n="jumpEyebrow"></p>
            <p class="section-copy" data-i18n="jumpIntro"></p>
          </div>
          <div class="jump-links" id="jumpChips"></div>
        </section>

        <section class="section start-section" id="start">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="startEyebrow"></p>
            <h2 data-i18n="startTitle"></h2>
            <p class="section-copy" data-i18n="startIntro"></p>
          </div>
          <div class="start-grid" id="startCards"></div>
        </section>

        <section class="creator-grid">
          <article class="section offer-panel" id="proof-notes">
            <div class="section-heading">
              <p class="eyebrow" data-i18n="offerEyebrow"></p>
              <h2 data-i18n="offerTitle"></h2>
              <p class="section-copy" data-i18n="offerIntro"></p>
            </div>
            <div class="offer-grid" id="offerCards"></div>
          </article>

          <article class="section rules-panel" id="rules">
            <div class="section-heading">
              <p class="eyebrow" data-i18n="rulesEyebrow"></p>
              <h2 data-i18n="rulesTitle"></h2>
            </div>
            <div class="rules-card-grid">
              <article class="rule-card">
                <h3 data-i18n="doTitle"></h3>
                <ul id="doList"></ul>
              </article>
              <article class="rule-card rule-card-soft">
                <h3 data-i18n="dontTitle"></h3>
                <ul id="dontList"></ul>
              </article>
            </div>
          </article>
        </section>

        <section class="section reference-detail-section" id="references">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="referenceDetailEyebrow"></p>
            <h2 data-i18n="referenceDetailTitle"></h2>
            <p class="section-copy" data-i18n="referenceDetailIntro"></p>
          </div>
          <div class="reference-detail-grid" id="referenceDetailCards"></div>
        </section>

        <section class="section section-alt" id="brief-table">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="scriptBreakdownEyebrow"></p>
            <h2 data-i18n="scriptBreakdownTitle"></h2>
            <p class="section-copy" data-i18n="scriptBreakdownIntro"></p>
          </div>
          <div class="script-breakdown-grid" id="scriptBreakdowns"></div>
        </section>

        <section class="section section-alt">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="starterEyebrow"></p>
            <h2 data-i18n="starterTitle"></h2>
            <p class="section-copy" data-i18n="starterIntro"></p>
          </div>
          <div class="starter-layout">
            <article class="script-card">
              <div class="script-card-header">
                <span data-i18n="scriptLabel"></span>
              </div>
              <div id="starterScript"></div>
            </article>
            <article class="tip-card">
              <h3 data-i18n="creatorChecklistTitle"></h3>
              <ul id="creatorChecklist"></ul>
            </article>
          </div>
        </section>

        <section class="section">
          <div class="two-column">
            <article class="tip-card">
              <h3 data-i18n="productBulletsTitle"></h3>
              <ul id="productBullets"></ul>
            </article>
            <article class="tip-card">
              <h3 data-i18n="brandBulletsTitle"></h3>
              <ul id="brandBullets"></ul>
            </article>
          </div>
        </section>

        <section class="section">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="hooksEyebrow"></p>
            <h2 data-i18n="hooksTitle"></h2>
          </div>
          <div class="two-column">
            <article class="tip-card">
              <h3 data-i18n="hooksCardTitle"></h3>
              <ul id="hookList"></ul>
            </article>
            <article class="tip-card">
              <h3 data-i18n="ctaCardTitle"></h3>
              <ul id="ctaList"></ul>
            </article>
          </div>
        </section>

        <section class="section">
          <div class="section-heading">
            <p class="eyebrow" data-i18n="nextEyebrow"></p>
            <h2 data-i18n="nextTitle"></h2>
          </div>
          <div class="next-grid">
            <article class="next-card">
              <h3 data-i18n="nextBlockOneTitle"></h3>
              <p data-i18n="nextBlockOneBody"></p>
            </article>
            <article class="next-card">
              <h3 data-i18n="nextBlockTwoTitle"></h3>
              <p data-i18n="nextBlockTwoBody"></p>
            </article>
            <article class="next-card">
              <h3 data-i18n="nextBlockThreeTitle"></h3>
              <p data-i18n="nextBlockThreeBody"></p>
            </article>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
