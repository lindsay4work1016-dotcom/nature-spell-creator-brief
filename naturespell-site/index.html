<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nature Spell creator action page with quick hooks, filming logic, video style references, and platform-safe claim guidance."
    />
    <meta name="theme-color" content="#f6efe7" />
    <title>Nature Spell Info Center</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23117b76'/%3E%3Cpath d='M18 38c10-2 18-10 23-21 7 7 9 17 5 25-5 10-18 14-28 10 4-4 10-7 16-8-7 0-12-2-16-6Z' fill='%23fff8ef'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero" id="top">
        <div class="hero-main">
          <p class="eyebrow" data-i18n="brandEyebrow"></p>
          <h1 data-layout="siteTitle"></h1>
          <p class="lede hero-lede" data-layout="siteIntro"></p>
          <div class="hero-tag-grid" id="heroTags"></div>
        </div>

        <aside class="hero-side">
          <div class="language-switcher" aria-label="Language switcher">
            <button class="lang-btn active" data-lang="en">English</button>
            <button class="lang-btn" data-lang="es">Español</button>
            <button class="lang-btn" data-lang="it">Italiano</button>
            <button class="lang-btn" data-lang="de">Deutsch</button>
            <button class="lang-btn" data-lang="fr">Français</button>
          </div>

          <article class="guide-card">
            <p class="eyebrow" data-i18n="guideEyebrow"></p>
            <h2 class="guide-title" data-i18n="guideTitle"></h2>
            <p class="guide-copy" data-i18n="guideBody"></p>
            <p class="guide-note" data-i18n="guideNote"></p>
            <div class="guide-pill-grid" id="guidePills"></div>
          </article>
        </aside>
      </header>

      <nav class="quick-nav" aria-label="Quick section navigation">
        <p class="eyebrow" data-layout="navEyebrow"></p>
        <div class="quick-nav-list">
          <a class="quick-nav-link" href="#overview" data-nav="overview"></a>
          <a class="quick-nav-link" href="#how-to-film" data-nav="filming"></a>
          <a class="quick-nav-link" href="#styles" data-nav="styles"></a>
          <a class="quick-nav-link" href="#policy" data-nav="policy"></a>
        </div>
      </nav>

      <section class="action-strip" aria-labelledby="actionStripTitle">
        <div class="action-strip-head">
          <p class="eyebrow" data-layout="actionEyebrow"></p>
          <h2 id="actionStripTitle" class="action-strip-title" data-layout="actionTitle"></h2>
        </div>
        <div class="action-strip-grid" id="actionCards"></div>
      </section>

      <main id="mainContent">
        <section class="section" id="overview">
          <div class="section-heading">
            <p class="eyebrow" data-layout="overviewEyebrow"></p>
            <h2 data-layout="overviewTitle"></h2>
            <p class="section-copy" data-layout="overviewIntro"></p>
          </div>

          <div class="overview-grid">
            <article class="panel">
              <div class="panel-header">
                <p class="mini-label" data-layout="payoutTitle"></p>
                <h3 data-i18n="offerTitle"></h3>
                <p class="panel-copy" data-i18n="offerIntro"></p>
              </div>
              <div class="offer-grid compact-grid" id="offerCards"></div>
            </article>

            <article class="panel">
              <div class="panel-header">
                <p class="mini-label" data-i18n="productIntroEyebrow"></p>
                <h3 data-i18n="productIntroTitle"></h3>
              </div>
              <ul id="productIntroList"></ul>

              <div class="promo-box">
                <p class="mini-label" data-i18n="promoEyebrow"></p>
                <p class="promo-title" data-i18n="promoTitle"></p>
                <p class="panel-copy" data-i18n="promoIntro"></p>
                <ul id="promoList"></ul>
              </div>
            </article>

            <article class="panel panel-teal">
              <div class="panel-header">
                <p class="mini-label" data-layout="benchmarkEyebrow"></p>
                <h3 data-layout="benchmarkTitle"></h3>
              </div>
              <p class="panel-copy" data-layout="benchmarkIntro"></p>
              <a class="creator-link" id="benchmarkLink" href="https://www.tiktok.com/@fleureleanorgreen" target="_blank" rel="noreferrer noopener"></a>
              <ul id="benchmarkList"></ul>
            </article>
          </div>
        </section>

        <section class="section" id="how-to-film">
          <div class="section-heading">
            <p class="eyebrow" data-layout="compareEyebrow"></p>
            <h2 data-layout="compareTitle"></h2>
            <p class="section-copy" data-layout="compareIntro"></p>
          </div>
          <div class="route-compare-grid" id="routeCompareCards"></div>
        </section>

        <section class="section" id="styles">
          <div class="section-heading">
            <p class="eyebrow" data-layout="breakdownEyebrow"></p>
            <h2 data-layout="breakdownTitle"></h2>
            <p class="section-copy" data-layout="breakdownIntro"></p>
          </div>
          <div class="style-stack" id="styleSections"></div>
        </section>

        <section class="section" id="policy">
          <div class="section-heading">
            <p class="eyebrow" data-layout="policyEyebrow"></p>
            <h2 data-layout="policyTitle"></h2>
            <p class="section-copy" data-layout="policyIntro"></p>
          </div>

          <div class="handoff-grid">
            <article class="panel">
              <div class="panel-header">
                <p class="mini-label" data-layout="reusableEyebrow"></p>
                <h3 data-layout="reusableTitle"></h3>
                <p class="panel-copy" data-layout="reusableIntro"></p>
              </div>
              <div class="hook-card-grid" id="hookCards"></div>
            </article>

            <article class="panel">
              <div class="panel-header">
                <p class="mini-label" data-i18n="ctaCardTitle"></p>
                <h3 data-layout="repeatableTitle"></h3>
              </div>
              <div class="tight-columns">
                <div>
                  <h4 class="subhead" data-i18n="ctaCardTitle"></h4>
                  <ul id="ctaList"></ul>
                </div>
                <div>
                  <h4 class="subhead" data-i18n="doTitle"></h4>
                  <ul id="doList"></ul>
                </div>
              </div>
            </article>

            <article class="panel panel-alert">
              <div class="panel-header">
                <p class="mini-label" data-i18n="dontTitle"></p>
                <h3 data-layout="avoidTitle"></h3>
              </div>
              <ul id="dontList"></ul>
            </article>
          </div>

          <div class="policy-grid">
            <article class="panel">
              <div class="panel-header">
                <p class="mini-label" data-layout="platformRulesEyebrow"></p>
                <h3 data-layout="platformRulesTitle"></h3>
              </div>
              <ul id="platformRuleList"></ul>
            </article>

            <article class="panel">
              <div class="panel-header">
                <p class="mini-label" data-layout="medicalEyebrow"></p>
                <h3 data-layout="medicalDoTitle"></h3>
              </div>
              <ul id="medicalDoList"></ul>
            </article>

            <article class="panel panel-alert">
              <div class="panel-header">
                <p class="mini-label" data-layout="medicalEyebrow"></p>
                <h3 data-layout="medicalDontTitle"></h3>
              </div>
              <ul id="medicalDontList"></ul>
            </article>
          </div>
        </section>
      </main>
    </div>

    <aside class="mobile-dock" id="mobileDock" aria-label="Mobile progress dock">
      <div class="mobile-dock-copy">
        <p class="mobile-dock-label" data-layout="dockLabel"></p>
        <p class="mobile-dock-title" id="mobileDockTitle"></p>
      </div>
      <div class="mobile-dock-actions">
        <button class="mobile-dock-btn" type="button" id="mobileDockPrimary" data-dock-action="next"></button>
        <button class="mobile-dock-btn mobile-dock-btn-secondary" type="button" id="mobileDockTop" data-dock-action="top"></button>
      </div>
    </aside>

    <script src="script.js"></script>
  </body>
</html>
